name: Daily Stock Picker

on:
  schedule:
    # 每天 UTC 時間 07:00 執行 (台灣時間 15:00)
    - cron: '0 7 * * 1-5' # 1-5 代表只在週一到週五執行
  workflow_dispatch: # 允許在 GitHub 網頁上手動點擊執行

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run Stock Bot
      env:
        # 這裡會從 GitHub 保險箱拿出你的 Token 變成環境變數
        LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
        TARGET_ID: ${{ secrets.TARGET_ID }}
      run: python pythonForStock_v2.py 
      # ⚠️ 注意：如果你的 Python 檔名不叫 stock_bot.py，請把上面那行改掉！